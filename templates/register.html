{% extends "base.html" %}
{% block title %}Register - CineMatch{% endblock %}

{% block content %}
<div class="container" style="max-width:520px; padding-top:40px;">
    <div style="background:#121212; border:1px solid #2d2d2d; border-radius:16px; padding:38px; box-shadow: 0 24px 50px rgba(0,0,0,0.35);">
        <h1 style="font-size:32px; color:#fff; margin-bottom:12px;">Create your account.</h1>
        <p style="color:#bbb; margin-bottom:28px; font-size:15px; line-height:1.6;">Sign up to save your favorites, build a watchlist, and get recommendations based on your movie personality.</p>

        <form method="POST" action="/register" style="display:grid; gap:16px;">
            <label style="color:#ddd; font-size:13px;">Name</label>
            <input type="text" name="name" required autocomplete="name" style="width:100%; padding:14px; border-radius:10px; border:1px solid #333; background:#141414; color:#fff;">

            <label style="color:#ddd; font-size:13px;">Email</label>
            <input type="email" name="email" required autocomplete="email" style="width:100%; padding:14px; border-radius:10px; border:1px solid #333; background:#141414; color:#fff;">

            <label style="color:#ddd; font-size:13px;">Password</label>
            <input type="password" name="password" required autocomplete="new-password" style="width:100%; padding:14px; border-radius:10px; border:1px solid #333; background:#141414; color:#fff;">

            <label style="color:#ddd; font-size:13px;">Confirm Password</label>
            <input type="password" name="confirm_password" required autocomplete="new-password" style="width:100%; padding:14px; border-radius:10px; border:1px solid #333; background:#141414; color:#fff;">

            <button type="submit" class="btn" style="width:100%; font-size:15px; padding:14px;">Register</button>
        </form>

        <p style="color:#888; font-size:14px; margin-top:22px; text-align:center;">Already have an account? <a href="/login" style="color:#e50914; text-decoration:none;">Sign in</a>.</p>
    </div>
</div>
{% endblock %}
