{% extends "base.html" %}
{% block title %}Login - CineMatch{% endblock %}

{% block content %}
<div class="container" style="max-width:520px; padding-top:40px;">
    <div style="background:#121212; border:1px solid #2d2d2d; border-radius:16px; padding:38px; box-shadow: 0 24px 50px rgba(0,0,0,0.35);">
        <h1 style="font-size:32px; color:#fff; margin-bottom:12px;">Welcome back.</h1>
        <p style="color:#bbb; margin-bottom:28px; font-size:15px; line-height:1.6;">Sign in to CineMatch to unlock favorites, watchlist, and personalized movie recommendations tailored to your taste.</p>

        <form method="POST" action="/login" style="display:grid; gap:16px;">
            <label style="color:#ddd; font-size:13px;">Email</label>
            <input type="email" name="email" required autocomplete="email" style="width:100%; padding:14px; border-radius:10px; border:1px solid #333; background:#141414; color:#fff;">

            <label style="color:#ddd; font-size:13px;">Password</label>
            <input type="password" name="password" required autocomplete="current-password" style="width:100%; padding:14px; border-radius:10px; border:1px solid #333; background:#141414; color:#fff;">

            <button type="submit" class="btn" style="width:100%; font-size:15px; padding:14px;">Login</button>
        </form>

        <p style="color:#888; font-size:14px; margin-top:22px; text-align:center;">New to CineMatch? <a href="/register" style="color:#e50914; text-decoration:none;">Create an account</a>.</p>
    </div>
</div>
{% endblock %}
